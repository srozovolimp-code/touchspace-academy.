  <script>
    (function () {
      var raw = window.CoswickAdvancedBlock02Data;
      var storageKey = "touchspaceCoswickAdvancedBlock02V6";
      var moduleMeta = raw.метаданные.модуль;
      var pages = raw.учебный_контент.страницы.slice().sort(function (a, b) {
        return Number(a.порядковый_номер || 0) - Number(b.порядковый_номер || 0);
      });
      var pageTests = {};
      raw.тесты.тесты_страниц.forEach(function (test) { pageTests[test.идентификатор_теста] = test; });
      var finalTest = raw.тесты.итоговый_тест_модуля;
      var nextModuleUrl = 'coswick-advanced-block-03.html';
      var nextModuleLabel = 'К следующему модулю';

      function esc(value) {
        return String(value == null ? "" : value).replace(/[&<>"']/g, function (char) {
          return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char];
        });
      }
      function humanText(value) {
        var text = String(value == null ? "" : value);
        text = text
          .replace(/Студенты/g, 'Реселлеры')
          .replace(/Студентов/g, 'Реселлеров')
          .replace(/Студентам/g, 'Реселлерам')
          .replace(/Студенту/g, 'Реселлеру')
          .replace(/Студентом/g, 'Реселлером')
          .replace(/Студента/g, 'Реселлера')
          .replace(/Студент/g, 'Реселлер')
          .replace(/студенты/g, 'реселлеры')
          .replace(/студентов/g, 'реселлеров')
          .replace(/студентам/g, 'реселлерам')
          .replace(/студенту/g, 'реселлеру')
          .replace(/студентом/g, 'реселлером')
          .replace(/студента/g, 'реселлера')
          .replace(/студент/g, 'реселлер')
          .replace(/учебной страницы/g, 'раздела')
          .replace(/учебная страница/g, 'раздел')
          .replace(/учебную страницу/g, 'раздел')
          .replace(/страницы модуля/g, 'раздела курса')
          .replace(/страница модуля/g, 'раздел курса');
        if (text.indexOf('Для раздела важно не просто сообщить четыре или пять фактов') === 0) {
          return 'Важно не просто запомнить несколько фактов, а понять, как они работают в консультации. Год основания говорит о накопленном опыте, место производства — о происхождении продукта, специализация — о направлении компетенции, а экспорт — о масштабе присутствия. Вместе эти данные формируют достоверный профиль бренда без лишних обещаний.';
        }
        if (text.indexOf('После изучения страницы реселлер должен') === 0) {
          return 'После изучения раздела реселлер сможет пересказать сведения своими словами, не искажая смысл. Хороший ответ содержит точные данные и не добавляет маркетинговых преувеличений.';
        }
        return text;
      }
      function humanTitle(value) {
        var title = humanText(value);
        if (title === 'Расширенное объяснение') return 'Что важно запомнить';
        return title;
      }
      function humanLabel(value) {
        return humanText(value).replace(/_/g, ' ').replace(/^./, function (char) { return char.toUpperCase(); });
      }
      function safe(value) { return esc(humanText(value)); }
      function loadState() {
        try { return JSON.parse(localStorage.getItem(storageKey) || "{}"); } catch (error) { return {}; }
      }
      function saveState(state) { localStorage.setItem(storageKey, JSON.stringify(state)); }
      function pageId(page) { return page.идентификатор_страницы; }
      function pageAt(index) {
        return pages.find(function (page) { return Number(page.порядковый_номер) === index + 1; }) || pages[index];
      }
      function canBypassTests() {
        var api = window.TouchSpaceAcademy;
        var user = api && api.getActiveUser ? api.getActiveUser() : null;
        return !!user && (user.id === 'admin' || user.type === 'admin' || user.id === 'supplier' || user.type === 'supplier');
      }
      function pagePassed(state, id) { return !!(state.pages && state.pages[id] && state.pages[id].passed); }
      function allPagesPassed(state) { return pages.every(function (page) { return pagePassed(state, pageId(page)); }); }
      function finalPassed(state) { return !!(state.finalTest && state.finalTest.passed); }
      function completedCount(state) {
        return pages.reduce(function (total, page) {
          return total + (pagePassed(state, pageId(page)) ? 1 : 0);
        }, 0) + (finalPassed(state) ? 1 : 0);
      }
      function renderProgress(state) {
        var total = pages.length + 1;
        var done = completedCount(state);
        var percent = Math.round(done / total * 100);
        document.querySelector('[data-progress-label]').textContent = 'Пройдено ' + done + ' из ' + total;
        document.querySelector('[data-progress-percent]').textContent = percent + '%';
        document.querySelector('[data-progress-bar]').style.width = percent + '%';
      }
      function unlocked(state, index) {
        if (canBypassTests()) return true;
        if (index === 0) return true;
        if (index < pages.length) return pagePassed(state, pageId(pages[index - 1]));
        return allPagesPassed(state);
      }
      function normalizeQuestion(q) {
        return {
          id: q.идентификатор,
          type: q.тип_вопроса,
          q: humanText(q.текст_вопроса),
          options: (q.варианты_ответа || q.элементы_для_упорядочивания || []).map(function (item) { return [item.идентификатор, humanText(item.текст)]; }),
          correct: q.правильный_ответ ? q.правильный_ответ.значение : [],
          exp: humanText(q.пояснение || "")
        };
      }
      function blockTitle(block) { return block.заголовок ? '<h3>' + esc(humanTitle(block.заголовок)) + '</h3>' : ''; }
      function renderCards(items) {
        return '<div class="coswick-grid">' + asListItems(items).map(function (item) {
          if (typeof item === 'string') return '<div class="coswick-card"><strong>' + safe(item) + '</strong></div>';
          var title = item.название || item.title || item.ситуация || '';
          var value = item.значение || item.text || item.подзаголовок || '';
          var description = item.описание || item.пояснение || item.роль || item.смысл || '';
          return '<div class="coswick-card"><strong>' + safe(title) + '</strong>' + (value ? '<span>' + safe(value) + '</span>' : '') + (description ? '<p>' + safe(description) + '</p>' : '') + '</div>';
        }).join("") + '</div>';
      }
      function renderTable(rows, columns) {
        var normalized = rows.map(function (row) { return Array.isArray(row) ? row : Object.keys(row).map(function (key) { return row[key]; }); });
        var head = columns && columns.length ? '<div class="coswick-table__row coswick-table__row--head coswick-table__row--' + columns.length + '">' + columns.map(function (cell) { return '<span>' + safe(cell) + '</span>'; }).join("") + '</div>' : '';
        return '<div class="coswick-table">' + head + normalized.map(function (row) {
          return '<div class="coswick-table__row coswick-table__row--' + row.length + '">' + row.map(function (cell) { return '<span>' + safe(cell) + '</span>'; }).join("") + '</div>';
        }).join("") + '</div>';
      }
      function asListItems(value) {
        if (!value) return [];
        if (Array.isArray(value)) return value;
        if (Array.isArray(value.элементы)) return value.элементы;
        if (Array.isArray(value.карточки)) return value.карточки;
        if (Array.isArray(value.данные)) return value.данные;
        return Object.keys(value).map(function (key) {
          var item = value[key];
          if (typeof item === 'string') return { название: key, описание: item };
          if (Array.isArray(item)) return { название: key, описание: item.join(', ') };
          if (item && typeof item === 'object') return Object.assign({ название: key }, item);
          return { название: key, описание: String(item == null ? '' : item) };
        });
      }
      function renderList(items) {
        return '<ul class="coswick-list">' + asListItems(items).map(function (item) {
          if (typeof item === 'string') return '<li>' + safe(item) + '</li>';
          var title = item.название || item.текст || item.этап || '';
          var text = item.описание || item.пояснение || item.значение || '';
          return '<li>' + (title ? '<strong>' + safe(title) + '</strong>' : '') + (text ? '<span>' + safe(text) + '</span>' : '') + '</li>';
        }).join("") + '</ul>';
      }
      function renderErrors(items) {
        return '<div class="coswick-examples">' + asListItems(items).map(function (item) {
          if (typeof item === 'string') return '<div class="coswick-example"><p>' + safe(item) + '</p></div>';
          var title = item.название || item.ошибка || item.текст || 'Ошибка';
          var text = item.описание || item.пояснение || item.последствие || item.как_исправить || '';
          return '<div class="coswick-example"><p><b>' + safe(title) + '</b></p>' + (text ? '<p>' + safe(text) + '</p>' : '') + '</div>';
        }).join("") + '</div>';
      }
      function renderBlock(block) {
        var type = block.тип_блока;
        var content = block.содержимое || {};
        var body = '';
        if (type === 'карточки' || type === 'карточки_коллекций' || type === 'карточки_форматов') {
          body = renderCards(content.карточки || content.данные || []);
        } else if (type === 'типичные_ошибки') {
          body = renderErrors(content.данные || content.элементы || content);
        } else if (type === 'текст') {
          body = '<div class="coswick-text">' + (content.абзацы || []).map(function (p) { return '<p>' + safe(p) + '</p>'; }).join("") + '</div>';
        } else if (type === 'хронология') {
          body = '<div class="coswick-timeline">' + (content.события || []).map(function (event) { return '<article><b>' + safe(event.год) + '</b><p>' + safe(event.событие) + '</p></article>'; }).join("") + '</div>';
        } else if (type === 'уведомление') {
          body = '<div class="coswick-callout">' + safe(content.текст) + '</div>';
        } else if (type === 'список_категорий' || type === 'опоры_позиционирования' || type === 'список') {
          var items = content.данные || content.элементы || content;
          body = renderList(items);
        } else if (type === 'алгоритм') {
          body = '<div class="coswick-formula">' + (content.этапы || []).map(function (step, stepIndex) {
            if (typeof step === 'string') return '<div class="coswick-step"><strong>Шаг ' + (stepIndex + 1) + '</strong><span>' + safe(step) + '</span></div>';
            var title = step.название || step.label || step.этап || ('Шаг ' + (stepIndex + 1));
            var text = step.описание || step.text || step.действие || step.пояснение || '';
            return '<div class="coswick-step"><strong>' + safe(title) + '</strong><span>' + safe(text) + '</span></div>';
          }).join("") + '</div>';
        } else if (type === 'таблица') {
          body = renderTable(content.строки || [], content.столбцы || []);
        } else if (type === 'примеры') {
          body = '<div class="coswick-examples">' + (content.примеры || []).map(function (example) {
            var parts = Object.keys(example).map(function (key) { return '<p><b>' + esc(humanLabel(key)) + ':</b> ' + safe(example[key]) + '</p>'; }).join("");
            return '<div class="coswick-example">' + parts + '</div>';
          }).join("") + '</div>';
        } else {
          body = '<div class="coswick-callout">Этот блок пока не настроен для отображения.</div>';
        }
        return '<section class="block content-section">' + blockTitle(block) + body + '</section>';
      }
      function renderTabs(state, current) {
        var tabs = pages.map(function (page, index) {
          var locked = !unlocked(state, index);
          var passed = pagePassed(state, pageId(page));
          return '<button class="lesson-tab' + (index === current ? ' is-active' : '') + (passed ? ' is-done' : '') + (locked ? ' is-locked' : '') + '" type="button" data-go="' + index + '"' + (locked ? ' disabled' : '') + '><span class="tab-num">' + (index + 1) + '</span><span><span class="tab-title">' + safe(page.название) + '</span><span class="tab-meta">' + (passed ? 'пройдено' : (canBypassTests() ? 'доступен без теста' : 'раздел курса')) + '</span></span><span class="tab-check">' + (passed ? '✓' : '') + '</span></button>';
        }).join("");
        var finalLocked = !unlocked(state, pages.length);
        var finalDone = !!(state.finalTest && state.finalTest.passed);
        tabs += '<button class="lesson-tab' + (current === pages.length ? ' is-active' : '') + (finalDone ? ' is-done' : '') + (finalLocked ? ' is-locked' : '') + '" type="button" data-go="' + pages.length + '"' + (finalLocked ? ' disabled' : '') + '><span class="tab-num">★</span><span><span class="tab-title">Итоговый тест</span><span class="tab-meta">' + (finalLocked ? 'закрыт' : (finalDone ? 'пройдено' : (canBypassTests() ? 'доступен без теста' : 'доступен'))) + '</span></span><span class="tab-check">' + (finalDone ? '✓' : '') + '</span></button>';
        document.querySelector('[data-lesson-list]').innerHTML = tabs;
      }
      function questionHtml(q, pageIndex, index) {
        var question = normalizeQuestion(q);
        if (question.type === 'верно_неверно') {
          return '<div class="question" data-question="' + index + '"><strong>' + (index + 1) + '. ' + safe(question.q) + '</strong><label><input type="radio" name="p' + pageIndex + 'q' + index + '" value="true"> Верно</label><label><input type="radio" name="p' + pageIndex + 'q' + index + '" value="false"> Неверно</label></div>';
        }
        if (question.type === 'последовательность') {
          var options = '<option value="">Выберите этап</option>' + question.options.map(function (option) { return '<option value="' + esc(option[0]) + '">' + safe(option[1]) + '</option>'; }).join("");
          return '<div class="question" data-question="' + index + '"><strong>' + (index + 1) + '. ' + safe(question.q) + '</strong><div class="sequence-list">' + question.correct.map(function (_, pos) { return '<label class="sequence-row"><b>' + (pos + 1) + '</b><select name="p' + pageIndex + 'q' + index + 'seq">' + options + '</select></label>'; }).join("") + '</div></div>';
        }
        var inputType = question.type === 'несколько_ответов' ? 'checkbox' : 'radio';
        return '<div class="question" data-question="' + index + '"><strong>' + (index + 1) + '. ' + safe(question.q) + '</strong>' + question.options.map(function (option) { return '<label><input type="' + inputType + '" name="p' + pageIndex + 'q' + index + '" value="' + esc(option[0]) + '"> ' + safe(option[1]) + '</label>'; }).join("") + '</div>';
      }
      function currentTest(index) { return index === pages.length ? finalTest : pageTests[pageAt(index).связанный_тест]; }
      function renderStageContent(index, state) {
        if (index === pages.length) {
          state.finalTest = state.finalTest || { status: 'available', lastScore: null, attempts: 0, passed: false };
          saveState(state);
          var bypass = canBypassTests();
          var canContinue = state.finalTest.passed || bypass;
          return '<article class="lesson-slide is-active" data-rendered-page="' + index + '"><span class="lesson-kicker">Итог</span><h2 class="lesson-title">' + safe(finalTest.название) + '</h2><p class="lesson-lead">Открывается после прохождения всех разделов курса. Вопросы охватывают ключевые темы модуля и помогают закрепить консультационную логику.</p><div class="blocks"><div class="block coswick-callout">' + (bypass ? 'Для администратора и поставщика следующий шаг доступен без прохождения теста.' : 'Следующий шаг откроется после результата итогового теста не ниже ' + finalTest.проходной_балл_процентов + '%.') + '</div></div><div class="lesson-actions"><div class="lesson-actions__row"><button class="btn secondary" type="button" data-course-prev>Назад</button><button class="btn" type="button" data-open-test="' + pages.length + '">' + (state.finalTest.passed ? 'Повторить итоговый тест' : 'Пройти итоговый тест') + '</button><a class="btn" href="' + nextModuleUrl + '"' + (canContinue ? '' : ' aria-disabled="true" tabindex="-1"') + '>' + nextModuleLabel + '</a><span class="result ' + (canContinue ? 'good' : '') + '">' + (state.finalTest.passed ? 'Модуль пройден.' : (bypass ? 'Доступ открыт для вашей роли.' : 'Для перехода нужен итоговый результат не ниже ' + finalTest.проходной_балл_процентов + '%.')) + '</span></div></div></article>';
        }
        var page = pageAt(index);
        var passed = pagePassed(state, pageId(page));
        return '<article class="lesson-slide is-active" data-rendered-page="' + index + '" data-rendered-id="' + esc(pageId(page)) + '"><span class="lesson-kicker">Раздел ' + (index + 1) + '</span><h2 class="lesson-title">' + safe(page.название) + '</h2><p class="lesson-lead">' + safe(page.цель_страницы) + '</p><div class="blocks">' + page.контент_страницы.map(renderBlock).join("") + '</div><div class="lesson-actions"><div class="lesson-actions__row"><button class="btn secondary" type="button" data-course-prev>Назад</button><button class="btn" type="button" data-open-test="' + index + '">' + (passed ? 'Повторить тест' : 'Пройти тест раздела') + '</button><button class="btn" type="button" data-course-next' + (passed ? '' : ' disabled') + '>Следующий раздел</button><span class="result ' + (passed ? 'good' : '') + '" data-result>' + (passed ? 'Раздел пройден. Следующий открыт.' : 'Для перехода нужно 100% правильных ответов.') + '</span></div><p class="lesson-actions__note">Тест открывается в отдельном окне после материала раздела.</p></div></article>';
      }
      function openQuiz(index) {
        var test = currentTest(index);
        var isFinal = index === pages.length;
        var quizModal = document.querySelector('[data-quiz-modal]');
        document.querySelector('[data-quiz-title]').textContent = test.название || pages[index].название;
        document.querySelector('[data-quiz-kicker]').textContent = isFinal ? 'Итоговая проверка' : 'Проверка страницы ' + (index + 1);
        document.querySelector('[data-quiz-content]').innerHTML = test.вопросы.map(function (q, qIndex) { return questionHtml(q, index, qIndex); }).join("");
        document.querySelector('[data-feedback]').innerHTML = '';
        document.querySelector('[data-quiz-next]').hidden = true;
        document.querySelector('[data-quiz-next]').removeAttribute('data-quiz-next-target');
        document.querySelector('[data-quiz-next-module]').hidden = !(isFinal && finalPassed(loadState()) && nextModuleUrl);
        document.querySelector('[data-quiz-next-module]').textContent = nextModuleLabel;
        document.querySelector('[data-modal-result]').textContent = isFinal ? 'Для зачета модуля нужен результат не ниже ' + finalTest.проходной_балл_процентов + '%.' : 'Для перехода дальше нужен результат 100%.';
        document.querySelector('[data-modal-result]').className = 'result';
        document.querySelector('[data-check-page]').setAttribute('data-check-page', index);
        quizModal.setAttribute('data-open-page', String(index));
        quizModal.classList.add('is-open');
        quizModal.setAttribute('aria-hidden', 'false');
      }
      function closeQuiz() {
        var quizModal = document.querySelector('[data-quiz-modal]');
        quizModal.classList.remove('is-open');
        quizModal.setAttribute('aria-hidden', 'true');
        quizModal.removeAttribute('data-open-page');
      }
      function renderPage(current) {
        var state = loadState();
        renderTabs(state, current);
        var total = pages.length + 1;
        renderProgress(state);
        document.querySelector('[data-stage-count]').textContent = 'Раздел ' + (current + 1) + ' из ' + total;
        document.querySelector('[data-course-stage]').replaceChildren();
        document.querySelector('[data-course-stage]').insertAdjacentHTML('afterbegin', renderStageContent(current, state));
        document.querySelectorAll('[data-course-prev]').forEach(function (button) { button.disabled = current === 0; });
        document.querySelectorAll('[data-course-next]').forEach(function (button) { button.disabled = button.disabled || !unlocked(loadState(), current + 1); });
        syncStage(current);
      }
      function syncStage(index) {
        var stage = document.querySelector('[data-course-stage]');
        var article = stage && stage.querySelector('[data-rendered-page]');
        var expected = String(index);
        var title = stage && stage.querySelector('.lesson-title');
        var expectedTitle = index === pages.length ? finalTest.название : pageAt(index).название;
        if (!article || article.getAttribute('data-rendered-page') !== expected || !title || title.textContent !== expectedTitle) {
          stage.replaceChildren();
          stage.insertAdjacentHTML('afterbegin', renderStageContent(index, loadState()));
        }
      }
      function answerValues(index, qIndex, type) {
        if (type === 'последовательность') return Array.prototype.slice.call(document.querySelectorAll('[name="p' + index + 'q' + qIndex + 'seq"]')).map(function (select) { return select.value; });
        return Array.prototype.slice.call(document.querySelectorAll('[name="p' + index + 'q' + qIndex + '"]:checked')).map(function (input) { return input.value; }).sort();
      }
      function checkPage(index) {
        current = index;
        var state = loadState();
        state.pages = state.pages || {};
        var isFinal = index === pages.length;
        var test = currentTest(index);
        var correct = 0;
        var messages = [];
        test.вопросы.forEach(function (rawQuestion, qIndex) {
          var q = normalizeQuestion(rawQuestion);
          var selected = answerValues(index, qIndex, q.type);
          var ok = q.type === 'верно_неверно' ? selected[0] === String(q.correct) : selected.join('|') === q.correct.slice().sort().join('|');
          if (q.type === 'последовательность') ok = selected.join('|') === q.correct.join('|');
          var node = document.querySelector('[data-question="' + qIndex + '"]');
          if (node) { node.classList.toggle('is-correct', ok); node.classList.toggle('is-wrong', !ok); }
          if (ok) correct += 1; else messages.push(q.exp);
        });
        var score = Math.round(correct / test.вопросы.length * 100);
        var passed = isFinal ? score >= finalTest.проходной_балл_процентов : correct === test.вопросы.length;
        if (isFinal) {
          state.finalTest = state.finalTest || {};
          state.finalTest.attempts = (state.finalTest.attempts || 0) + 1;
          state.finalTest.lastScore = score;
          state.finalTest.passed = passed;
          state.finalTest.status = passed ? 'passed' : 'failed';
        } else {
          var id = pageId(pageAt(index));
          state.pages[id] = state.pages[id] || {};
          state.pages[id].attempts = (state.pages[id].attempts || 0) + 1;
          state.pages[id].lastScore = score;
          state.pages[id].passed = passed;
        }
        saveState(state);
        var result = document.querySelector('[data-result]');
        var modalResult = document.querySelector('[data-modal-result]');
        var quizNext = document.querySelector('[data-quiz-next]');
        var quizNextModule = document.querySelector('[data-quiz-next-module]');
        if (result) { result.className = 'result ' + (passed ? 'good' : 'bad'); result.textContent = score + '%. ' + (passed ? (isFinal ? 'Итоговый тест пройден.' : 'Раздел пройден. Следующий открыт.') : (isFinal ? 'Следующий модуль заблокирован. Попробуйте ещё раз.' : 'Следующий раздел заблокирован. Исправьте ответы и попробуйте ещё раз.')); }
        if (modalResult) { modalResult.className = 'result ' + (passed ? 'good' : 'bad'); modalResult.textContent = score + '%. ' + (passed ? (isFinal ? 'Модуль пройден.' : 'Раздел пройден. Можно перейти дальше.') : 'Есть ошибки. Пояснения ниже, попробуйте ещё раз.'); }
        if (quizNext) {
          var hasNextPage = !isFinal && index < pages.length;
          quizNext.hidden = !(passed && hasNextPage);
          if (passed && hasNextPage) quizNext.setAttribute('data-quiz-next-target', String(index + 1));
          else quizNext.removeAttribute('data-quiz-next-target');
        }
        if (quizNextModule) {
          quizNextModule.hidden = !(passed && isFinal && nextModuleUrl);
          quizNextModule.textContent = nextModuleLabel;
        }
        document.querySelector('[data-feedback]').innerHTML = passed ? '' : messages.map(function (msg) { return '<div>' + esc(msg) + '</div>'; }).join('');
        renderTabs(loadState(), index);
        document.querySelectorAll('[data-course-next]').forEach(function (button) { button.disabled = !passed; });
        if (isFinal) renderPage(index);
      }
      var current = 0;
      function handleCourseClick(event) {
        var tab = event.target.closest('[data-go]');
        var next = event.target.closest('[data-course-next]');
        var prev = event.target.closest('[data-course-prev]');
        var check = event.target.closest('[data-check-page]');
        var open = event.target.closest('[data-open-test]');
        var quizNext = event.target.closest('[data-quiz-next]');
        var quizNextModule = event.target.closest('[data-quiz-next-module]');
        var close = event.target.closest('[data-close-quiz]');
        var modal = event.target.matches('[data-quiz-modal]');
        if (!(tab || next || prev || check || open || quizNext || quizNextModule || close || modal)) return;
        event.preventDefault();
        event.stopImmediatePropagation();
        if (tab) {
          var target = Number(tab.getAttribute('data-go'));
          if (unlocked(loadState(), target)) { current = target; renderPage(current); }
          return;
        }
        if (next) {
          if (unlocked(loadState(), current + 1)) { current += 1; renderPage(current); }
          return;
        }
        if (prev) {
          if (current > 0) { current -= 1; renderPage(current); }
          return;
        }
        if (open) { openQuiz(Number(open.getAttribute('data-open-test'))); return; }
        if (quizNext) {
          var openPage = Number(document.querySelector('[data-quiz-modal]').getAttribute('data-open-page'));
          var targetFromQuiz = !Number.isNaN(openPage) ? openPage + 1 : Number(quizNext.getAttribute('data-quiz-next-target'));
          if (!Number.isNaN(targetFromQuiz) && targetFromQuiz <= pages.length && unlocked(loadState(), targetFromQuiz)) {
            closeQuiz();
            current = targetFromQuiz;
            renderPage(current);
          }
          return;
        }
        if (quizNextModule) {
          if (nextModuleUrl) window.location.href = nextModuleUrl;
          return;
        }
        if (close || modal) { closeQuiz(); return; }
        if (check) checkPage(Number(check.getAttribute('data-check-page')));
      }
      document.addEventListener('click', handleCourseClick, true);
      document.addEventListener('keydown', function (event) { if (event.key === 'Escape') closeQuiz(); });
      if (window.TouchSpaceHeader && typeof window.TouchSpaceHeader.refreshFavorites === 'function') window.TouchSpaceHeader.refreshFavorites();
      renderPage(current);
    })();
  </script>

</body>
</html>
